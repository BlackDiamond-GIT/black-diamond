services:
  - type: web
    name: black-diamond
    runtime: python
    plan: starter
    branch: main
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /cs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,black-diamond.onrender.com,black-diamond.cz,www.black-diamond.cz,blackdiamond.cz,www.blackdiamond.cz
      - key: CSRF_TRUSTED_ORIGINS
        value: https://black-diamond.onrender.com,https://black-diamond.cz,https://www.black-diamond.cz,https://blackdiamond.cz,https://www.blackdiamond.cz
      - key: DATABASE_URL
        fromDatabase:
          name: black-diamond-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: black-diamond-db
    plan: basic-256mb
    databaseName: black_diamond
    user: black_diamond
