services:
  - type: web
    name: black-diamond
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /cs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,blackdiamond.cz,www.blackdiamond.cz
      - key: CSRF_TRUSTED_ORIGINS
        value: https://black-diamond.onrender.com,https://blackdiamond.cz,https://www.blackdiamond.cz
      - key: DATABASE_URL
        fromDatabase:
          name: black-diamond-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: black-diamond-db
    plan: free
    databaseName: black_diamond
    user: black_diamond
